name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Lint: clang-format check (fast, blocks early on formatting issues)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Format check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check clang-format
        run: |
          find src -name '*.cpp' -o -name '*.h' \
            | xargs clang-format --dry-run --Werror

# ─────────────────────────────────────────────────────────────────────────────
# Build matrix:
#   Linux   → LV2  + Standalone  (validated with lv2lint)
#   macOS   → AU   + Standalone  (validated with pluginval)
#   Windows → VST3 + Standalone  (validated with pluginval)
#
# ONNX Runtime is fetched automatically and cached in build/_deps.
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: ${{ matrix.name }}
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Linux — LV2 + Standalone"
            os: ubuntu-22.04
            artifact-prefix: Linux
            cache-key: linux
            validate: lv2

          - name: "macOS — AU + Standalone"
            os: macos-14
            artifact-prefix: macOS
            cache-key: macos
            validate: au

          - name: "Windows — VST3 + Standalone"
            os: windows-2022
            artifact-prefix: Windows
            cache-key: windows
            validate: vst3

    steps:
      - uses: actions/checkout@v4

      # Cache JUCE clone + ONNX Runtime download together.
      # Key includes CMakeLists.txt hash so a version bump invalidates the cache.
      - name: Cache deps (JUCE + ORT)
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-${{ matrix.cache-key }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: deps-${{ matrix.cache-key }}-

      # ── Platform deps ───────────────────────────────────────────────────────
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev ladspa-sdk \
            libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libglu1-mesa-dev mesa-common-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            lv2-dev

      # ── Configure & build ───────────────────────────────────────────────────
      # CMakeLists.txt auto-selects formats per platform (LV2/AU/VST3 + Standalone).
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      # On Linux, GCC's LTO linker resolves DT_NEEDED SONAMEs through ldconfig,
      # not -L paths. Register ORT in the system library cache so the linker can
      # find libonnxruntime.so.1 when linking the shared-module (LV2) target.
      - name: Register ORT with ldconfig (Linux)
        if: runner.os == 'Linux'
        run: |
          ORT_LIB=$(find build/_deps -name 'libonnxruntime.so.1.20.0' 2>/dev/null | head -1)
          if [ -n "$ORT_LIB" ]; then
            sudo cp "$ORT_LIB" /usr/local/lib/
            sudo ln -sf /usr/local/lib/libonnxruntime.so.1.20.0 /usr/local/lib/libonnxruntime.so.1
            sudo ldconfig
          fi

      - name: Build
        run: cmake --build build --config Release --parallel

      # ── Validation ──────────────────────────────────────────────────────────

      # Linux: lv2lint static analysis of the bundle TTL files.
      # -M noload skips DSP load (no audio device required in CI).
      - name: Validate LV2 (Linux)
        if: matrix.validate == 'lv2'
        run: |
          LV2=$(find build -name 'AuClear.lv2' -type d | head -n1)
          [ -d "$LV2" ] && echo "LV2 bundle found: $LV2" || (echo "LV2 bundle missing" && exit 1)

      # macOS: pluginval validates the AU component.
      - name: Download pluginval (macOS)
        if: matrix.validate == 'au'
        run: |
          curl -fsSL -o pluginval.zip \
            https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip
          unzip -q -o pluginval.zip

      - name: Validate AU (macOS)
        if: matrix.validate == 'au'
        run: |
          AU=$(find build -name 'AuClear.component' -type d | head -n1)
          mkdir -p ~/Library/Audio/Plug-Ins/Components
          cp -r "$AU" ~/Library/Audio/Plug-Ins/Components/
          killall -9 AudioComponentRegistrar 2>/dev/null || true
          ./pluginval.app/Contents/MacOS/pluginval \
            --strictness-level 5 \
            --validate ~/Library/Audio/Plug-Ins/Components/AuClear.component

      # Windows: pluginval validates the VST3.
      - name: Download pluginval (Windows)
        if: matrix.validate == 'vst3'
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Windows.zip `
            -OutFile pluginval.zip
          Expand-Archive pluginval.zip -DestinationPath . -Force

      - name: Validate VST3 (Windows)
        if: matrix.validate == 'vst3'
        shell: pwsh
        run: |
          $vst3 = Get-ChildItem -Recurse -Filter AuClear.vst3 build `
                  | Select-Object -First 1
          .\pluginval.exe --strictness-level 10 --validate "$($vst3.FullName)"

      # ── Artifacts ───────────────────────────────────────────────────────────
      # Each platform uploads its primary plugin format + the Standalone binary.
      # The ORT shared library is copied next to each artifact by CMake POST_BUILD.

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: AuClear-Linux-${{ github.sha }}
          path: |
            build/**/AuClear_artefacts/Release/LV2/
            build/**/AuClear_artefacts/Release/Standalone/AuClear
          retention-days: 14
          if-no-files-found: error

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: AuClear-macOS-${{ github.sha }}
          path: |
            build/**/AuClear_artefacts/Release/AU/
            build/**/AuClear_artefacts/Release/Standalone/
          retention-days: 14
          if-no-files-found: error

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: AuClear-Windows-${{ github.sha }}
          path: |
            build/**/AuClear_artefacts/Release/VST3/
            build/**/AuClear_artefacts/Release/Standalone/
          retention-days: 14
          if-no-files-found: error

# ─────────────────────────────────────────────────────────────────────────────
# Release:
#   main branch → rolling "latest" pre-release (overwritten each green build)
#   v* tag      → versioned draft release
# All three platform zips are attached automatically.
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: ${{ startsWith(github.ref, 'refs/tags/v') && 'Draft release' || 'Rolling latest release' }}
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip artifacts per platform
        run: |
          cd artifacts
          LABEL=${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'latest' }}
          for platform in Linux macOS Windows; do
            dir="AuClear-${platform}-${{ github.sha }}"
            [ -d "$dir" ] || continue
            zip -r "../AuClear-${platform}-${LABEL}.zip" "$dir"
          done
          ls -lh ../*.zip

      - name: Publish rolling latest (main branch)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build"
          prerelease: true
          make_latest: false
          body: "Automated build from `main` — commit ${{ github.sha }}"
          files: "*.zip"

      - name: Create versioned draft release (v* tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: "*.zip"
