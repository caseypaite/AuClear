name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Lint: clang-format check (fast, runs first so formatting problems block early)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Format check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check clang-format
        run: |
          find src -name '*.cpp' -o -name '*.h' \
            | xargs clang-format --dry-run --Werror

# ─────────────────────────────────────────────────────────────────────────────
# Build + pluginval: Linux / macOS / Windows
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.name }}
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-22.04
            cache-key: linux
          - name: macOS
            os: macos-14
            cache-key: macos
          - name: Windows
            os: windows-2022
            cache-key: windows

    steps:
      - uses: actions/checkout@v4

      # Cache the FetchContent JUCE clone so subsequent runs skip the download.
      # Key includes the JUCE tag; bump when the tag changes in CMakeLists.txt.
      - name: Cache JUCE source
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-${{ matrix.cache-key }}-8.0.4-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            juce-${{ matrix.cache-key }}-8.0.4-
            juce-${{ matrix.cache-key }}-

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev ladspa-sdk \
            libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libglu1-mesa-dev mesa-common-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      # ── pluginval ──────────────────────────────────────────────────────────
      - name: Cache pluginval (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: pluginval
          key: pluginval-linux-latest-v1

      - name: Download pluginval (Linux)
        if: runner.os == 'Linux'
        run: |
          if [ ! -f pluginval ]; then
            curl -fsSL -o pluginval.zip \
              https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Linux.zip
            unzip -o pluginval.zip
          fi
          chmod +x pluginval

      - name: Download pluginval (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -fsSL -o pluginval.zip \
            https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip
          unzip -o pluginval.zip

      - name: Download pluginval (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Windows.zip `
            -OutFile pluginval.zip
          Expand-Archive pluginval.zip -DestinationPath . -Force

      - name: Validate VST3 (Linux)
        if: runner.os == 'Linux'
        run: |
          VST3=$(find build -name 'AuClear.vst3' -type d | head -n1)
          ./pluginval --strictness-level 10 --validate "$VST3"

      - name: Validate VST3 (macOS)
        if: runner.os == 'macOS'
        run: |
          VST3=$(find build -name 'AuClear.vst3' -type d | head -n1)
          ./pluginval.app/Contents/MacOS/pluginval --strictness-level 10 --validate "$VST3"

      - name: Validate VST3 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vst3 = Get-ChildItem -Recurse -Filter AuClear.vst3 build | Select-Object -First 1
          ./pluginval.exe --strictness-level 10 --validate "$($vst3.FullName)"

      # ── Artifacts ─────────────────────────────────────────────────────────
      - name: Upload plugin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AuClear-${{ matrix.name }}-${{ github.sha }}
          path: |
            build/**/AuClear_artefacts/**/*.vst3
            build/**/AuClear_artefacts/**/*.component
            build/**/AuClear_artefacts/**/*.lv2
          retention-days: 14
          if-no-files-found: warn

# ─────────────────────────────────────────────────────────────────────────────
# Release: create a draft GitHub Release when a v* tag is pushed
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Draft release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip artifacts per platform
        run: |
          cd artifacts
          for dir in AuClear-Linux-* AuClear-macOS-* AuClear-Windows-*; do
            [ -d "$dir" ] || continue
            platform="${dir%%-*-*}" # e.g. "AuClear-Linux"
            zip -r "../${platform}-${{ github.ref_name }}.zip" "$dir"
          done
          ls -lh ../*.zip

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: "*.zip"
